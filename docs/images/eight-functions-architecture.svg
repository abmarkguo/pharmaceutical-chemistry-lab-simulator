<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="cardGrad1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="cardGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#2d4a3e"/>
    </linearGradient>
    <linearGradient id="cardGrad3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#4a2d3e"/>
    </linearGradient>
    <linearGradient id="centerGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#1158c7"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <rect width="900" height="620" fill="url(#bgGrad)" rx="12"/>
  
  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#e6edf3" font-family="Segoe UI, Arial" font-size="20" font-weight="bold">Eight Core Functions Architecture</text>
  <text x="450" y="55" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="13">八大核心功能架构</text>
  
  <!-- Center hub -->
  <circle cx="450" cy="310" r="70" fill="url(#centerGrad)" filter="url(#glow)"/>
  <text x="450" y="300" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial" font-size="14" font-weight="bold">Pharma Lab</text>
  <text x="450" y="318" text-anchor="middle" fill="#ffffff" font-family="Segoe UI, Arial" font-size="14" font-weight="bold">Simulator</text>
  <text x="450" y="338" text-anchor="middle" fill="#a5d6ff" font-family="Segoe UI, Arial" font-size="11">8 Functions</text>
  
  <!-- F1: Drug Synthesis (top-left) -->
  <rect x="30" y="80" width="180" height="70" rx="10" fill="url(#cardGrad1)" stroke="#388bfd" stroke-width="1.5"/>
  <text x="120" y="105" text-anchor="middle" fill="#79c0ff" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F1 Drug Synthesis</text>
  <text x="120" y="125" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">药物合成实验模拟</text>
  <text x="120" y="142" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">7-stage / reaction mechanism</text>
  <line x1="210" y1="115" x2="390" y2="275" stroke="#388bfd" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F2: Drug Analysis (top-center) -->
  <rect x="360" y="80" width="180" height="70" rx="10" fill="url(#cardGrad1)" stroke="#388bfd" stroke-width="1.5"/>
  <text x="450" y="105" text-anchor="middle" fill="#79c0ff" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F2 Drug Analysis</text>
  <text x="450" y="125" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">药物分析实验模拟</text>
  <text x="450" y="142" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">6-stage / HPLC/GC/UV/titration</text>
  <line x1="450" y1="150" x2="450" y2="240" stroke="#388bfd" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F3: Pharmaceutics (top-right) -->
  <rect x="690" y="80" width="180" height="70" rx="10" fill="url(#cardGrad1)" stroke="#388bfd" stroke-width="1.5"/>
  <text x="780" y="105" text-anchor="middle" fill="#79c0ff" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F3 Pharmaceutics</text>
  <text x="780" y="125" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">药剂学实验模拟</text>
  <text x="780" y="142" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">8-stage / GMP / QC</text>
  <line x1="690" y1="115" x2="510" y2="275" stroke="#388bfd" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F4: Pharmacology/Toxicology (mid-left) -->
  <rect x="30" y="280" width="180" height="70" rx="10" fill="url(#cardGrad2)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="120" y="305" text-anchor="middle" fill="#7ee787" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F4 Pharm/Toxic</text>
  <text x="120" y="325" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">药理/毒理实验模拟</text>
  <text x="120" y="342" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">7-stage / 3R / GLP</text>
  <line x1="210" y1="315" x2="390" y2="310" stroke="#3fb950" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F5: SOP Generation (mid-right) -->
  <rect x="690" y="280" width="180" height="70" rx="10" fill="url(#cardGrad2)" stroke="#3fb950" stroke-width="1.5"/>
  <text x="780" y="305" text-anchor="middle" fill="#7ee787" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F5 SOP Generation</text>
  <text x="780" y="325" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">实验方案与SOP生成</text>
  <text x="780" y="342" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">Standardized docs / reagent lists</text>
  <line x1="690" y1="315" x2="510" y2="310" stroke="#3fb950" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F6: Safety Assessment (bottom-left) -->
  <rect x="30" y="480" width="180" height="70" rx="10" fill="url(#cardGrad3)" stroke="#f85149" stroke-width="1.5"/>
  <text x="120" y="505" text-anchor="middle" fill="#ffa198" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F6 Safety Assessment</text>
  <text x="120" y="525" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">安全评估与应急预案</text>
  <text x="120" y="542" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">Risk matrix / MSDS / emergency</text>
  <line x1="210" y1="500" x2="390" y2="345" stroke="#f85149" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F7: Assessment (bottom-center) -->
  <rect x="360" y="480" width="180" height="70" rx="10" fill="url(#cardGrad3)" stroke="#f85149" stroke-width="1.5"/>
  <text x="450" y="505" text-anchor="middle" fill="#ffa198" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F7 Assessment</text>
  <text x="450" y="525" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">实验考核与评分</text>
  <text x="450" y="542" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">Question bank / rubrics / diagnostic</text>
  <line x1="450" y1="480" x2="450" y2="380" stroke="#f85149" stroke-width="1.5" opacity="0.5"/>
  
  <!-- F8: Report Writing (bottom-right) -->
  <rect x="690" y="480" width="180" height="70" rx="10" fill="url(#cardGrad3)" stroke="#f85149" stroke-width="1.5"/>
  <text x="780" y="505" text-anchor="middle" fill="#ffa198" font-family="Segoe UI, Arial" font-size="13" font-weight="bold">F8 Report Writing</text>
  <text x="780" y="525" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="11">实验报告撰写辅导</text>
  <text x="780" y="542" text-anchor="middle" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">Template / data analysis / self-check</text>
  <line x1="690" y1="500" x2="510" y2="345" stroke="#f85149" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Legend -->
  <rect x="30" y="585" width="12" height="12" rx="2" fill="url(#cardGrad1)" stroke="#388bfd"/>
  <text x="48" y="595" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">Experiment Simulation</text>
  <rect x="200" y="585" width="12" height="12" rx="2" fill="url(#cardGrad2)" stroke="#3fb950"/>
  <text x="218" y="595" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">Teacher Tools</text>
  <rect x="340" y="585" width="12" height="12" rx="2" fill="url(#cardGrad3)" stroke="#f85149"/>
  <text x="358" y="595" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">Safety & Assessment</text>
  <text x="870" y="595" text-anchor="end" fill="#6e7681" font-family="Segoe UI, Arial" font-size="10">OpenClaw Skill v1.0</text>
</svg>
