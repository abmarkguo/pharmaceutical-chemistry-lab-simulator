  <text x="510" y="534" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">&lt;467&gt;</text>
  <text x="680" y="534" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">2.4.24</text>
