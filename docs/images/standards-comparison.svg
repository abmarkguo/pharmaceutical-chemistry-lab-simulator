  <text x="340" y="494" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">1101</text>
  <text x="510" y="494" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">&lt;71&gt;</text>
  <text x="680" y="494" text-anchor="middle" fill="#8b949e" font-family="Segoe UI, Arial" font-size="10">2.6.1</text>
